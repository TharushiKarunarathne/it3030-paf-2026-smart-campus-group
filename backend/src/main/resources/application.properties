# App
spring.application.name=smart-campus

# MongoDB
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/smart_campus}

# JWT
jwt.secret=${JWT_SECRET:smartcampus-super-secret-key-2026-change-in-production}
jwt.expiration=86400000

# Google OAuth
google.client-id=${GOOGLE_CLIENT_ID:your-google-client-id}

# File upload
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=15MB

# Server port
server.port=8080

# Logging
logging.level.com.smartcampus=DEBUG